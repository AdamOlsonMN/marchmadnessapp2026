# Same as nginx.conf but for a custom domain (e.g. mm.adamolson.org).
# Use this as default.conf when you have a domain; replace server_name with your subdomain.
# Docker: proxy to api:8000. Bare metal: proxy to 127.0.0.1:8000.
server {
    listen 80;
    server_name mm.adamolson.org;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
