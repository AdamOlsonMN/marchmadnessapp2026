# Run API + reverse proxy. Build frontend and put output in ./frontend-dist, then:
#   docker compose up -d
# Refresh artifacts (run after updating data/raw or bracket):
#   docker compose --profile tools run --rm refresh
# Frontend: build with `cd dashboard/frontend && npm run build` and copy dist/* to frontend-dist/
# (CI can rsync dashboard/frontend/dist to server:frontend-dist.)

services:
  api:
    build: .
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 3
    # No ports to host; only nginx talks to api.

  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend-dist:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy

  # One-off: docker compose run --rm refresh
  refresh:
    build: .
    volumes:
      - ./data:/app/data
    command: ["python", "scripts/refresh.py"]
    profiles:
      - tools
